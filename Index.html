  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.2/babel.min.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #09090F;

    }

</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState, useEffect } = React;

// ─── EA 2025 ──────────────────────────────────────────────────────────────────
const INDEX_YEARS = [
  { label: "FFPP Commencement", mult: 1.0000 },
  { label: "FFPP 1 Jan 2027",   mult: 1.0300 },
  { label: "FFPP 1 Jan 2028",   mult: 1.0609 },
  { label: "FFPP 1 Jan 2029",   mult: 1.0927 },
];
const RATES = {
  DVA_CPT:400, DVA_FO:250, DDO_CPT:1231, DDO_FO:837,
  DHA_CPT:17.51, DHA_FO:11.39, MISSED_MEAL:30, ACCOM_OPTOUT:75,
};

// ─── Airports ─────────────────────────────────────────────────────────────────
const AIRPORTS = [
  { code:"SYD", name:"Sydney",      flag:"🇦🇺", tz:"Australia/Sydney",    utcOffset:10 },
  { code:"MEL", name:"Melbourne",   flag:"🇦🇺", tz:"Australia/Melbourne", utcOffset:10 },
  { code:"PER", name:"Perth",       flag:"🇦🇺", tz:"Australia/Perth",     utcOffset:8  },
  { code:"SIN", name:"Singapore",   flag:"🇸🇬", tz:"Asia/Singapore",      utcOffset:8  },
  { code:"HKG", name:"Hong Kong",   flag:"🇭🇰", tz:"Asia/Hong_Kong",      utcOffset:8  },
  { code:"PVG", name:"Shanghai",    flag:"🇨🇳", tz:"Asia/Shanghai",       utcOffset:8  },
  { code:"AKL", name:"Auckland",    flag:"🇳🇿", tz:"Pacific/Auckland",    utcOffset:12 },
];
const AIRPORT_ZONE = {
  SYD:"domestic",MEL:"domestic",PER:"domestic",
  SIN:"hk_singapore",HKG:"hk_singapore",PVG:"china_japan",AKL:"auckland",
};
const DESTINATIONS = {
  domestic:     {label:"Domestic (AUS)",      flag:"🇦🇺",color:"#34D399",breakfast:33.25, lunch:37.65, dinner:53.15, incidental:17.85},
  auckland:     {label:"Auckland",            flag:"🇳🇿",color:"#60A5FA",breakfast:96.66, lunch:96.66, dinner:96.68, incidental:50.00},
  china_japan:  {label:"China / Japan",       flag:"🇨🇳",color:"#F472B6",breakfast:121.66,lunch:121.66,dinner:121.68,incidental:60.00},
  hk_singapore: {label:"HK / Singapore",      flag:"🇸🇬",color:"#A78BFA",breakfast:138.33,lunch:138.33,dinner:138.34,incidental:60.00},
};
const MEAL_WINDOWS = [
  {id:"b",label:"Breakfast",icon:"🍳",color:"#FCD34D",wS:7*60+30, wE:9*60+30, key:"breakfast"},
  {id:"l",label:"Lunch",    icon:"🥗",color:"#86EFAC",wS:11*60+30,wE:13*60+30,key:"lunch"},
  {id:"d",label:"Dinner",   icon:"🍽️",color:"#F59E0B",wS:17*60+30,wE:19*60+30,key:"dinner"},
];
const DAY_NAMES=["MON","TUE","WED","THU","FRI","SAT","SUN"];
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Sector colour palette (cycles)
const SECTOR_COLORS=["#38BDF8","#86EFAC","#F472B6","#FBBF24","#A78BFA","#FB923C","#34D399","#F87171"];

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getUtcOffsetHours(code, dateStr) {
  const ap=AIRPORTS.find(a=>a.code===code); if(!ap) return 0;
  if(!dateStr) return ap.utcOffset;
  try {
    const d=new Date(dateStr+"T12:00:00Z");
    const fmt=new Intl.DateTimeFormat("en",{timeZone:ap.tz,hour:"numeric",minute:"numeric",hour12:false});
    const parts=fmt.formatToParts(d);
    const lH=parseInt(parts.find(p=>p.type==="hour")?.value||"12");
    const lM=parseInt(parts.find(p=>p.type==="minute")?.value||"0");
    return (lH*60+lM-12*60)/60;
  } catch { return ap.utcOffset; }
}
function utcMins(timeStr, code, dateStr) {
  const m=parseTime(timeStr); if(m==null) return null;
  return m - getUtcOffsetHours(code,dateStr)*60;
}
function calcDutyHours(onLocal,onCode,onDate,offLocal,offCode,offDate) {
  const on=utcMins(onLocal,onCode,onDate), off=utcMins(offLocal,offCode,offDate);
  if(on==null||off==null) return null;
  let d=off-on; if(d<0) d+=1440; return d/60;
}
function parseTime(s) {
  if(!s||!s.includes(":")) return null;
  const [h,m]=s.split(":").map(Number);
  if(isNaN(h)||isNaN(m)) return null;
  return h*60+m;
}
function fmtTime(m) {
  if(m==null) return "—";
  const n=((m%1440)+1440)%1440;
  return `${String(Math.floor(n/60)).padStart(2,"0")}:${String(n%60).padStart(2,"0")}`;
}
function fmtAUD(n) { return n.toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function zoneFrom(c) { return AIRPORT_ZONE[c]||"domestic"; }
function apInfo(c) { return AIRPORTS.find(a=>a.code===c)||null; }
// All date helpers use UTC to avoid DST day-slip in +10/+11 timezones like AEST/AEDT
function parseDate(s) { if(!s) return null; const d=new Date(s+"T00:00:00Z"); return isNaN(d)?null:d; }
function isoDate(d) { return d.toISOString().slice(0,10); }
function addDays(s,n) { const d=parseDate(s); if(!d) return ""; d.setUTCDate(d.getUTCDate()+n); return isoDate(d); }
function daysBetween(f,t) { const a=parseDate(f),b=parseDate(t); if(!a||!b) return 0; return Math.max(0,Math.round((b-a)/86400000)); }
function fmtShort(s) { const d=parseDate(s); if(!d) return "—"; return `${d.getUTCDate()} ${MONTHS[d.getUTCMonth()]}`; }
function fmtFull(s)  { const d=parseDate(s); if(!d) return "—"; return `${d.getUTCDate()} ${MONTHS[d.getUTCMonth()]} ${d.getUTCFullYear()}`; }
function getMon(s) {
  const d=parseDate(s); if(!d) return s;
  const dow=d.getUTCDay();            // 0=Sun,1=Mon,…,6=Sat
  const diff=dow===0?-6:1-dow;       // offset to reach Monday
  d.setUTCDate(d.getUTCDate()+diff);
  return isoDate(d);
}
function weekDate(mon,i) { return addDays(mon,i); }
function tzLabel(code,dateStr) {
  if(!code) return "";
  const off=getUtcOffsetHours(code,dateStr);
  return `UTC${off>=0?"+":""}${off}`;
}

// If sign-off time is earlier than sign-on time (crossed midnight),
// the pilot arrived at the hotel on the NEXT calendar day.
function hotelCheckInDate(tripDate, signOnTime, signOffTime) {
  const on  = parseTime(signOnTime);
  const off = parseTime(signOffTime);
  if (on != null && off != null && off < on) {
    return addDays(tripDate, 1); // overnight — hotel date is next day
  }
  return tripDate; // same day
}

// Meal calc
// Total slip in minutes: from check-in time on hotelFrom to check-out time on hotelTo
function totalSlipMins(ci,co,nights) { if(ci==null||co==null||nights<=0) return 0; return nights*1440-ci+co; }

// Build per-calendar-day meal coverage for the hotel stay.
//
// The stay spans (nights + 1) calendar days:
//   Day 0        = check-in day:     pilot present from ci → 24:00
//   Day 1…nights-1 = intermediate full days: 00:00 → 24:00  (all meals)
//   Day nights   = check-out day:    pilot present from 00:00 → co
//
// A meal window is covered when the pilot's presence on that calendar day
// overlaps the window by MORE than 30 minutes (Cl. 6.24).
//
// Returns array of { dayNum, date, b, l, d, isFullDay }.
function mealsCoveredPerDay(ci, co, nights, hotelFromStr) {
  if(ci==null||co==null||nights<=0) return [];
  const calDays = nights + 1;   // total calendar days at hotel
  return Array.from({length:calDays},(_,i)=>{
    let presStart, presEnd, isFullDay=false;
    if(i===0 && i===calDays-1) {
      // Single calendar day (same-day check-in and check-out, rare edge case)
      presStart=ci; presEnd=co;
    } else if(i===0) {
      // Check-in day: pilot arrives at ci, stays to midnight
      presStart=ci; presEnd=1440;
    } else if(i===calDays-1) {
      // Check-out day: pilot present from midnight to co
      presStart=0; presEnd=co;
    } else {
      // Full intermediate day: all meals always payable
      presStart=0; presEnd=1440; isFullDay=true;
    }

    const meals={};
    MEAL_WINDOWS.forEach(w=>{
      if(isFullDay) {
        meals[w.id]=true;  // full day → all windows covered by definition
      } else {
        const overlapMins=Math.max(0, Math.min(presEnd,w.wE) - Math.max(presStart,w.wS));
        meals[w.id]=overlapMins>30;  // EA Cl. 6.24: must exceed 30 minutes
      }
    });

    const date=hotelFromStr ? addDays(hotelFromStr,i) : "";
    return {dayNum:i+1, date, isFullDay, presStart, presEnd, ...meals};
  });
}

// ─── Sector factory ───────────────────────────────────────────────────────────
let _sectorId = 0;
function newSector(dep="", arr="") {
  return {
    id: ++_sectorId,
    flightNo:"", depAirport:dep, arrAirport:arr,
    sectorDate:"",          // if different from trip day (multi-day)
    rSignOn:"", rSignOff:"",
    aSignOn:"", aSignOff:"",
    missedMeal:false,
  };
}

// ─── Day factory ─────────────────────────────────────────────────────────────
function emptyDay() {
  return {
    sectors: [newSector(), newSector()],
    hasSlip:false, destination:"domestic",
    hotelFrom:"", hotelTo:"",
    hotelCheckIn:"", hotelCheckOut:"",
    ddoInfringed:false, accomOptOut:0,
    extraDva:false, extraDdo:false,
  };
}

// ─── Allowance engine ─────────────────────────────────────────────────────────
function calcAllowances(day, role, yearIdx, tripDate) {
  const mult=INDEX_YEARS[yearIdx].mult;
  const items=[];
  const add=(id,label,clause,color,icon,baseRate,qty,reason)=>{
    const rate=baseRate*mult;
    items.push({id,label,clause,color,icon,rate,qty,amount:rate*qty,reason});
  };

  // ── Per-sector DHA + DVA ──────────────────────────────────────────────────
  day.sectors.forEach((sec,idx) => {
    const sDate = sec.sectorDate || (idx > 0 && day.hotelTo ? day.hotelTo : tripDate);
    const col = SECTOR_COLORS[idx % SECTOR_COLORS.length];
    const label = `Sector ${idx+1}${sec.flightNo ? ` (${sec.flightNo})` : ""}`;

    // DHA
    const dh = calcDutyHours(
      sec.aSignOn||sec.rSignOn, sec.depAirport, sDate,
      sec.aSignOff||sec.rSignOff, sec.arrAirport, sDate
    );
    if(dh!=null&&dh>0) {
      const r=role==="cpt"?RATES.DHA_CPT:RATES.DHA_FO;
      const dOff=getUtcOffsetHours(sec.depAirport,sDate), aOff=getUtcOffsetHours(sec.arrAirport,sDate);
      add(`dha_${sec.id}`,`Duty Hour Allowance — ${label}`,"Cl. 6.9",col,"🕐",
        r*dh,1,`${dh.toFixed(2)}h UTC | ${sec.depAirport} ${tzLabel(sec.depAirport,sDate)} → ${sec.arrAirport} ${tzLabel(sec.arrAirport,sDate)}`);
    }

    // DVA (local-time comparison at dep port)
    const rOn=parseTime(sec.rSignOn),rOff=parseTime(sec.rSignOff);
    const aOn=parseTime(sec.aSignOn),aOff=parseTime(sec.aSignOff);
    if(rOn!=null&&rOff!=null&&(aOn!=null||aOff!=null)) {
      const actOn=aOn??rOn, actOff=aOff??rOff;
      const onE=Math.max(0,rOn-actOn), offL=Math.max(0,actOff-rOff);
      const mx=Math.max(onE,offL);
      if(mx>120) {
        const r=role==="cpt"?RATES.DVA_CPT:RATES.DVA_FO;
        const det=[];
        if(onE>120)det.push(`sign-on ${onE}min earlier`);
        if(offL>120)det.push(`sign-off ${offL}min later`);
        add(`dva_${sec.id}`,`Duty Variation — ${label}`,"Cl. 5.28","#F59E0B","⚡",
          r,1,det.join("; ")+` — >${mx>240?"4h":"2h"} buffer`);
      }
      if((aOn??rOn)<5*60)
        add(`early_${sec.id}`,`Early Report — ${label}`,"Cl. 5.19","#F87171","🌅",0,0,
          `Sign-on ${fmtTime(aOn??rOn)} before 0500`);
    }

    // Missed meal per sector
    if(sec.missedMeal)
      add(`missed_${sec.id}`,`Missed Crew Meal — ${label}`,"Cl. 23.1","#FB923C","🚫",
        RATES.MISSED_MEAL,1,`${label} — meal not provided`);
  });

  // ── DDO ──────────────────────────────────────────────────────────────────
  if(day.ddoInfringed) {
    const r=role==="cpt"?RATES.DDO_CPT:RATES.DDO_FO;
    add("ddo","Designated Day Off – Worked","Cl. 5.20/5.33","#EF4444","📅",r,1,"Duty infringed a rostered DDO");
  }

  // ── Extra DVA (manual) ────────────────────────────────────────────────────
  if(day.extraDva) {
    const r=role==="cpt"?RATES.DVA_CPT:RATES.DVA_FO;
    add("extra_dva","Duty Variation Allowance (Additional)","Cl. 5.28","#F59E0B","⚡",r,1,"Manually added additional DVA");
  }

  // ── Extra DDO payment (manual) ───────────────────────────────────────────
  if(day.extraDdo) {
    const r=role==="cpt"?RATES.DDO_CPT:RATES.DDO_FO;
    add("extra_ddo","Day Off Payment (Additional)","Cl. 5.20","#EF4444","📅",r,1,"Manually added additional day off payment");
  }

  // ── Meal allowances ─────────────────────────────────────────────────────
  // Only calculate if: hotel slip is explicitly enabled AND valid date range
  // with at least 1 night AND total slip exceeds 4 hours.
  // This ensures a turnaround flight with no overnight stay never triggers meals.
  const nightsForMeals = daysBetween(day.hotelFrom, day.hotelTo);
  if(day.hasSlip && nightsForMeals > 0 && day.hotelCheckIn && day.hotelCheckOut) {
    const ci=parseTime(day.hotelCheckIn), co=parseTime(day.hotelCheckOut);
    // Use hotelAfterSectorIdx to find the arrival airport for the meal zone —
    // this is the sector the pilot is at when they check in to the hotel.
    const hotelSec = day.sectors[day.hotelAfterSectorIdx ?? 0];
    const zone = hotelSec?.arrAirport ? zoneFrom(hotelSec.arrAirport) : (day.destination || "domestic");
    const dest = DESTINATIONS[zone]||DESTINATIONS.domestic;
    if(ci!=null&&co!=null) {
      const tot=totalSlipMins(ci,co,nightsForMeals);
      if(tot>4*60) {
        const pd=mealsCoveredPerDay(ci,co,nightsForMeals,day.hotelFrom);
        const mc={b:0,l:0,d:0};
        pd.forEach(d=>{if(d.b)mc.b++;if(d.l)mc.l++;if(d.d)mc.d++;});
        if(mc.b>0) add("meal_b",`Breakfast ×${mc.b} — ${dest.label}`,"Cl. 6.24(a)","#FCD34D","🍳",dest.breakfast,mc.b,`${dest.flag} ${mc.b}× across ${nightsForMeals}-night stay (0730–0930)`);
        if(mc.l>0) add("meal_l",`Lunch ×${mc.l} — ${dest.label}`,"Cl. 6.24(b)","#86EFAC","🥗",dest.lunch,mc.l,`${dest.flag} ${mc.l}× across ${nightsForMeals}-night stay (1130–1330)`);
        if(mc.d>0) add("meal_d",`Dinner ×${mc.d} — ${dest.label}`,"Cl. 6.24(c)","#F59E0B","🍽️",dest.dinner,mc.d,`${dest.flag} ${mc.d}× across ${nightsForMeals}-night stay (1730–1930)`);
        if(tot>24*60) add("meal_i",`Incidental — ${dest.label}`,"Cl. 6.24","#D97706","☕",dest.incidental,1,`${dest.flag} ${(tot/60).toFixed(1)}h total slip exceeds 24h`);
      }
    }
  }

  // ── Accom opt-out ─────────────────────────────────────────────────────────
  if(day.accomOptOut > 0) {
    const n = day.accomOptOut;
    add("accom","Accommodation Opt-Out","Cl. 6.32","#818CF8","🏨",RATES.ACCOM_OPTOUT,n,`${n} night(s) — 48h notice given`);
  }

  return items;
}

// ─── UI components ────────────────────────────────────────────────────────────
const mono="'IBM Plex Mono',monospace";

function Lbl({t,hi,color,extra}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
      <span style={{fontSize:8,letterSpacing:1,color:hi?"#38BDF8":color||"#4A5568",fontFamily:mono}}>{t}</span>
      {extra&&<span style={{fontSize:7,color:"#2D3748",fontFamily:mono,background:"#141420",borderRadius:3,padding:"1px 4px"}}>{extra}</span>}
    </div>
  );
}

function TInput({label,value,onChange,hi,color,tzLbl}) {
  return (
    <div style={{display:"flex",flexDirection:"column"}}>
      <Lbl t={label} hi={hi} color={color} extra={tzLbl}/>
      <input type="time" value={value} onChange={e=>onChange(e.target.value)} style={{
        background:"#09090F", border:`1px solid ${hi?"#1E3A5F":color?"#1a2a1a":"#1a1a2e"}`,
        borderRadius:6, color:value?"#E2E8F0":"#2D3748", padding:"5px 8px",
        fontFamily:mono, fontSize:13, width:100,
      }}/>
    </div>
  );
}

function DInput({label,value,onChange,hi}) {
  return (
    <div style={{display:"flex",flexDirection:"column"}}>
      <Lbl t={label} hi={hi}/>
      <input type="date" value={value} onChange={e=>onChange(e.target.value)} style={{
        background:"#09090F", border:`1px solid ${hi?"#1E3A5F":"#1a1a2e"}`,
        borderRadius:6, color:value?"#E2E8F0":"#2D3748", padding:"5px 8px",
        fontFamily:mono, fontSize:12, width:148, colorScheme:"dark",
      }}/>
    </div>
  );
}

function ASelect({label,value,onChange,hi,color,dateStr}) {
  const ap=apInfo(value);
  const tz=ap?tzLabel(value,dateStr):"";
  return (
    <div style={{display:"flex",flexDirection:"column"}}>
      <Lbl t={label} hi={hi} color={color} extra={tz||undefined}/>
      <select value={value} onChange={e=>onChange(e.target.value)} style={{
        background:"#09090F", border:`1px solid ${hi||color?"#1E3A5F":"#1a1a2e"}`,
        borderRadius:6, color:value?"#E2E8F0":"#2D3748", padding:"5px 8px",
        fontFamily:mono, fontSize:12, cursor:"pointer", width:152, appearance:"none",
      }}>
        <option value="">Select airport</option>
        {AIRPORTS.map(a=><option key={a.code} value={a.code}>{a.flag} {a.code} — {a.name}</option>)}
      </select>
    </div>
  );
}

function Toggle({label,checked,onChange,color="#38BDF8"}) {
  return (
    <div onClick={()=>onChange(!checked)} style={{display:"flex",alignItems:"center",gap:7,cursor:"pointer",userSelect:"none"}}>
      <div style={{width:32,height:18,borderRadius:9,background:checked?color:"#1a1a2e",border:`1px solid ${checked?color:"#2D3748"}`,position:"relative",transition:"all 0.2s",flexShrink:0}}>
        <div style={{position:"absolute",top:2,left:checked?14:2,width:12,height:12,borderRadius:"50%",background:checked?"#fff":"#4A5568",transition:"left 0.2s"}}/>
      </div>
      <span style={{fontSize:10,color:checked?"#CBD5E1":"#4A5568"}}>{label}</span>
    </div>
  );
}

function DiffBadge({ros,act,label}) {
  const r=parseTime(ros),a=parseTime(act);
  if(r==null||a==null) return null;
  const diff=r-a,abs=Math.abs(diff);
  const h=Math.floor(abs/60),m=abs%60;
  const str=h>0?`${h}h ${m}m`:`${m}m`;
  const dir=diff>0?"earlier":diff<0?"later":"on time";
  const col=abs===0?"#34D399":abs>240?"#EF4444":abs>120?"#F59E0B":"#34D399";
  return <span style={{fontSize:9,fontFamily:mono}}><span style={{color:"#4A5568"}}>{label}: </span><span style={{color:col,fontWeight:700}}>{abs===0?"on time":`${str} ${dir}`}</span></span>;
}

function Card({children,border,style={}}) {
  return <div style={{background:"#0D1117",border:`1px solid ${border||"#141420"}`,borderRadius:14,padding:"14px 18px",...style}}>{children}</div>;
}
function ICard({children,border,style={}}) {
  return <div style={{background:"#09090F",border:`1px solid ${border||"#141420"}`,borderRadius:10,padding:12,...style}}>{children}</div>;
}
function SHead({children}) {
  return <div style={{fontSize:9,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:12}}>{children}</div>;
}

// ─── SectorCard component ─────────────────────────────────────────────────────
function SectorCard({ sec, idx, sectorDate, tripDate, onUpdate, onRemove, onAddHotelAfter, hasHotelAfter, showHotelBtn, totalSectors }) {
  const col = SECTOR_COLORS[idx % SECTOR_COLORS.length];
  const dh = calcDutyHours(
    sec.aSignOn||sec.rSignOn, sec.depAirport, sectorDate,
    sec.aSignOff||sec.rSignOff, sec.arrAirport, sectorDate
  );

  return (
    <div style={{
      border:`1px solid ${col}35`,
      borderRadius:12,
      overflow:"hidden",
      marginBottom:6,
    }}>
      {/* Sector header */}
      <div style={{
        background:`${col}10`,
        borderBottom:`1px solid ${col}25`,
        padding:"10px 14px",
        display:"flex", alignItems:"center", gap:10,
      }}>
        {/* Number badge */}
        <div style={{
          width:24, height:24, borderRadius:6,
          background:col, display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:11, fontWeight:800, color:"#09090F", flexShrink:0,
        }}>{idx+1}</div>

        <div style={{display:"flex",gap:8,alignItems:"center",flex:1,flexWrap:"wrap"}}>
          <input
            value={sec.flightNo}
            onChange={e=>onUpdate("flightNo",e.target.value)}
            placeholder="Flight No."
            style={{background:"transparent",border:"none",borderBottom:`1px solid ${col}40`,color:"#E2E8F0",fontFamily:mono,fontSize:12,width:90,padding:"1px 0"}}
          />
          {sec.depAirport&&sec.arrAirport&&(
            <span style={{fontSize:11,fontFamily:mono,color:col,fontWeight:700}}>
              {apInfo(sec.depAirport)?.flag}{sec.depAirport} → {apInfo(sec.arrAirport)?.flag}{sec.arrAirport}
            </span>
          )}
          {dh!=null&&dh>0&&(
            <span style={{fontSize:10,fontFamily:mono,color:"#4A5568"}}>
              ⏱ <span style={{color:col,fontWeight:700}}>{dh.toFixed(2)}h</span> UTC
            </span>
          )}
        </div>

        {/* Sector date (only for sector 2+, as sector 1 always uses the trip day) */}
        {idx > 0 && (
          <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
            <span style={{fontSize:7,color:"#4A5568",fontFamily:mono}}>SECTOR DATE</span>
            <input type="date" value={sec.sectorDate||sectorDate} onChange={e=>onUpdate("sectorDate",e.target.value)}
              style={{background:"transparent",border:"none",borderBottom:`1px solid ${col}30`,color:sec.sectorDate?"#CBD5E1":"#4A5568",fontFamily:mono,fontSize:10,colorScheme:"dark",cursor:"pointer",width:100}}/>
          </div>
        )}

        {/* Remove button (always allow removal if >1 sector) */}
        {totalSectors > 1 && (
          <button onClick={onRemove} style={{
            background:"transparent",border:`1px solid #EF444440`,borderRadius:5,
            color:"#EF4444",fontSize:12,cursor:"pointer",padding:"2px 7px",flexShrink:0,
            fontFamily:mono,
          }}>✕</button>
        )}
      </div>

      {/* Sector body */}
      <div style={{padding:"12px 14px"}}>
        {/* Airports */}
        <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:14,alignItems:"flex-end"}}>
          <ASelect label="DEPARTURE" value={sec.depAirport} onChange={v=>onUpdate("depAirport",v)} dateStr={sec.sectorDate||sectorDate} color={col}/>
          <div style={{color:"#2D3748",fontSize:16,paddingBottom:6,alignSelf:"flex-end"}}>→</div>
          <ASelect label="ARRIVAL"   value={sec.arrAirport} onChange={v=>onUpdate("arrAirport",v)} dateStr={sec.sectorDate||sectorDate} hi/>
        </div>

        {/* Times grid */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
          <ICard>
            <div style={{fontSize:8,letterSpacing:1.5,color:"#4A5568",fontFamily:mono,marginBottom:9}}>📋 ROSTERED</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <TInput label="SIGN-ON"  value={sec.rSignOn}  onChange={v=>onUpdate("rSignOn",v)}  tzLbl={tzLabel(sec.depAirport,sec.sectorDate||sectorDate)||"—"}/>
              <TInput label="SIGN-OFF" value={sec.rSignOff} onChange={v=>onUpdate("rSignOff",v)} tzLbl={tzLabel(sec.arrAirport,sec.sectorDate||sectorDate)||"—"}/>
            </div>
          </ICard>
          <ICard border={`${col}40`}>
            <div style={{fontSize:8,letterSpacing:1.5,color:col,fontFamily:mono,marginBottom:9}}>✈ ACTUAL</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <TInput label="SIGN-ON"  value={sec.aSignOn}  onChange={v=>onUpdate("aSignOn",v)}  color={col} tzLbl={tzLabel(sec.depAirport,sec.sectorDate||sectorDate)||"—"}/>
              <TInput label="SIGN-OFF" value={sec.aSignOff} onChange={v=>onUpdate("aSignOff",v)} color={col} tzLbl={tzLabel(sec.arrAirport,sec.sectorDate||sectorDate)||"—"}/>
            </div>
          </ICard>
        </div>

        {/* Variance + DHA summary */}
        {(sec.rSignOn||sec.aSignOn)&&(
          <div style={{display:"flex",alignItems:"center",gap:14,flexWrap:"wrap",padding:"7px 10px",background:"#09090F",border:`1px solid ${col}20`,borderRadius:8}}>
            {dh!=null&&dh>0&&<span style={{fontSize:10,fontFamily:mono}}><span style={{color:"#4A5568"}}>UTC duty: </span><span style={{color:col,fontWeight:700}}>{dh.toFixed(2)}h</span></span>}
            <DiffBadge ros={sec.rSignOn}  act={sec.aSignOn}  label="Sign-on"/>
            <DiffBadge ros={sec.rSignOff} act={sec.aSignOff} label="Sign-off"/>
            <div style={{marginLeft:"auto"}}>
              <Toggle label="Missed meal" checked={sec.missedMeal} onChange={v=>onUpdate("missedMeal",v)} color="#FB923C"/>
            </div>
          </div>
        )}
      </div>

      {/* "Insert hotel" connector */}
      {showHotelBtn&&!hasHotelAfter&&(
        <div style={{padding:"0 14px 12px",display:"flex",justifyContent:"center"}}>
          <button onClick={onAddHotelAfter} style={{
            background:"#0A1A2F",border:"1px dashed #1E3A5F",borderRadius:8,
            color:"#38BDF8",fontSize:10,cursor:"pointer",padding:"5px 14px",
            fontFamily:mono,letterSpacing:0.5,
          }}>🏨 Hotel stay after this sector</button>
        </div>
      )}
    </div>
  );
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const today=new Date().toISOString().slice(0,10);
  const [weekStart,setWeekStart]=useState(()=>getMon(today));
  const [role,setRole]=useState("cpt");
  const [yearIdx,setYearIdx]=useState(0);
  const [empName,setEmpName]=useState("Capt. Sarah Chen");
  const [empNo,setEmpNo]=useState("EFA-0142");
  // allWeeks: { [weekStartStr]: { MON:..., TUE:..., ... } }
  const [allWeeks,setAllWeeks]=useState(()=>({[getMon(today)]:{...Object.fromEntries(DAY_NAMES.map(k=>[k,emptyDay()]))}}));
  const [active,setActive]=useState("MON");
  const [tab,setTab]=useState("entry");
  const [clock,setClock]=useState(new Date());
  const [confirmReset,setConfirmReset]=useState(false);
  // monthView: "YYYY-MM" string for the monthly summary
  const [monthView,setMonthView]=useState(()=>today.slice(0,7));

  // Current week's days
  const days = allWeeks[weekStart] ?? Object.fromEntries(DAY_NAMES.map(k=>[k,emptyDay()]));
  function setDays(updater) {
    setAllWeeks(prev=>{
      const cur = prev[weekStart] ?? Object.fromEntries(DAY_NAMES.map(k=>[k,emptyDay()]));
      const next = typeof updater==="function" ? updater(cur) : updater;
      return {...prev,[weekStart]:next};
    });
  }

  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);

  function dateFor(idx) { return weekDate(weekStart,idx); }
  function dateForName(name) { return dateFor(DAY_NAMES.indexOf(name)); }

  // Day updaters
  function updDay(key,field,val) { setDays(p=>({...p,[key]:{...p[key],[field]:val}})); }

  function updSector(dayKey,secId,field,val) {
    setDays(p=>{
      const day={...p[dayKey]};
      const sectors=day.sectors.map(s=>s.id===secId?{...s,[field]:val}:s);

      if(day.hasSlip&&day.hotelAfterSectorIdx!=null) {
        const beforeSec = sectors[day.hotelAfterSectorIdx];
        const afterSec  = sectors[day.hotelAfterSectorIdx+1];
        if(beforeSec&&(field==="aSignOff"||field==="rSignOff")) {
          const signOff=val||beforeSec.rSignOff||"";
          const signOn =beforeSec.aSignOn||beforeSec.rSignOn||"";
          day.hotelCheckIn=signOff;
          // Recompute hotel check-in date whenever sign-off changes
          const secDate=beforeSec.sectorDate||dateForName(dayKey);
          day.hotelFrom=hotelCheckInDate(secDate, signOn, signOff);
        }
        if(afterSec&&(field==="aSignOn"||field==="rSignOn")) {
          day.hotelCheckOut=val||afterSec.rSignOn||"";
        }
      }
      return {...p,[dayKey]:{...day,sectors}};
    });
  }

  function addSector(dayKey) {
    setDays(p=>{
      const day=p[dayKey];
      const last=day.sectors[day.sectors.length-1];
      // New sector: dep = last arr (chain the route)
      const ns=newSector(last?.arrAirport||"");
      return {...p,[dayKey]:{...day,sectors:[...day.sectors,ns]}};
    });
  }

  function insertSectorAt(dayKey, afterIdx) {
    setDays(p=>{
      const day=p[dayKey];
      const before=day.sectors[afterIdx];
      const after=day.sectors[afterIdx+1];
      // New connecting sector between before and after
      const ns=newSector(before?.arrAirport||"",after?.depAirport||"");
      const sectors=[...day.sectors.slice(0,afterIdx+1),ns,...day.sectors.slice(afterIdx+1)];
      return {...p,[dayKey]:{...day,sectors}};
    });
  }

  function removeSector(dayKey,secId) {
    setDays(p=>{
      const day=p[dayKey];
      if(day.sectors.length<=1) return p;
      const sectors=day.sectors.filter(s=>s.id!==secId);
      return {...p,[dayKey]:{...day,sectors}};
    });
  }

  function toggleSlip(dayKey,val) {
    setDays(p=>{
      if(!val) {
        // Turning slip OFF — clear all hotel data so no meals are calculated
        return {...p,[dayKey]:{
          ...p[dayKey],
          hasSlip:false,
          hotelFrom:"", hotelTo:"",
          hotelCheckIn:"", hotelCheckOut:"",
          hotelAfterSectorIdx:null,
        }};
      }
      const day={...p[dayKey],hasSlip:true};
      if(day.hotelAfterSectorIdx==null) day.hotelAfterSectorIdx=0;
      const before=day.sectors[day.hotelAfterSectorIdx];
      const after=day.sectors[day.hotelAfterSectorIdx+1];
      const signOff=before?.aSignOff||before?.rSignOff||"";
      const signOn =before?.aSignOn ||before?.rSignOn ||"";
      if(before&&!day.hotelCheckIn)  day.hotelCheckIn=signOff;
      if(after&&!day.hotelCheckOut)  day.hotelCheckOut=after.aSignOn||after.rSignOn||"";
      if(!day.hotelFrom) day.hotelFrom=hotelCheckInDate(dateForName(dayKey), signOn, signOff);
      return {...p,[dayKey]:day};
    });
  }

  function setHotelAfter(dayKey,idx) {
    setDays(p=>{
      const day={...p[dayKey],hasSlip:true,hotelAfterSectorIdx:idx};
      const before=day.sectors[idx];
      const after=day.sectors[idx+1];
      const signOff=before?.aSignOff||before?.rSignOff||day.hotelCheckIn||"";
      const signOn =before?.aSignOn ||before?.rSignOn ||"";
      const tripDate=dateForName(dayKey);
      // Sector date may override trip date for later sectors
      const secDate=before?.sectorDate||tripDate;
      day.hotelCheckIn=signOff;
      day.hotelCheckOut=after?.aSignOn||after?.rSignOn||day.hotelCheckOut||"";
      if(!day.hotelFrom) day.hotelFrom=hotelCheckInDate(secDate, signOn, signOff);
      return {...p,[dayKey]:day};
    });
  }

  const dayResults={};
  DAY_NAMES.forEach(d=>{dayResults[d]=calcAllowances(days[d],role,yearIdx,dateForName(d));});
  const dayTotals={};
  DAY_NAMES.forEach(d=>{dayTotals[d]=dayResults[d].reduce((s,i)=>s+i.amount,0);});
  const weekTotal=Object.values(dayTotals).reduce((s,v)=>s+v,0);

  const d=days[active];
  const dayDate=dateForName(active);
  const nights=daysBetween(d.hotelFrom,d.hotelTo);
  const ciM=parseTime(d.hotelCheckIn),coM=parseTime(d.hotelCheckOut);
  const totSlip=nights>0&&ciM!=null&&coM!=null?totalSlipMins(ciM,coM,nights):0;
  const perDayM=nights>0&&ciM!=null&&coM!=null?mealsCoveredPerDay(ciM,coM,nights,d.hotelFrom):[];

  // For hotel: determine zone from the sector before hotel
  const hotelBeforeSec = d.sectors[d.hotelAfterSectorIdx??0];
  const hotelZone = hotelBeforeSec?.arrAirport?zoneFrom(hotelBeforeSec.arrAirport):(d.destination||"domestic");
  const hotelDest = DESTINATIONS[hotelZone]||DESTINATIONS.domestic;
  const retDepTz = d.sectors[((d.hotelAfterSectorIdx??0)+1)]?.depAirport;

  const utc=clock.toISOString().slice(11,19)+"Z";

  return (
    <div style={{minHeight:"100vh",background:"#09090F",color:"#CBD5E1",fontFamily:"'Syne',sans-serif"}}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;700&display=swap');
        *{box-sizing:border-box;margin:0;padding:0;}
        ::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-track{background:#09090F;} ::-webkit-scrollbar-thumb{background:#1E2A3A;border-radius:2px;}
        input[type=time]::-webkit-calendar-picker-indicator,input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.3);cursor:pointer;}
        input:focus,select:focus{outline:none!important;}
        select option{background:#0D1117;color:#CBD5E1;}
        @keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
        .fadein{animation:fadein 0.25s ease both;}
        .dpill{cursor:pointer;transition:all 0.15s;} .dpill:hover{border-color:#1E3A5F!important;}
        .hrow:hover{background:rgba(56,189,248,0.03)!important;}
        .addBtn{transition:all 0.15s;} .addBtn:hover{background:#0A1A2F!important;border-color:#38BDF8!important;}
      `}</style>

      {/* ── Topbar ── */}
      <div style={{position:"sticky",top:0,zIndex:50,background:"#09090F",borderBottom:"1px solid #141420",display:"flex",alignItems:"center",gap:12,padding:"0 20px",height:52}}>
        <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
          <div style={{width:26,height:26,borderRadius:7,background:"linear-gradient(135deg,#1E3A5F,#0EA5E9)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12}}>✈</div>
          <div>
            <div style={{fontFamily:mono,fontSize:11,fontWeight:700,color:"#E2E8F0",letterSpacing:2}}>EFA PAY</div>
            <div style={{fontSize:7,color:"#2D3748",letterSpacing:1.5}}>EA 2025 · TRIP ALLOWANCE CALCULATOR</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:3,background:"#0D1117",border:"1px solid #141420",borderRadius:8,padding:"3px 6px",flexShrink:0}}>
          <span style={{fontSize:8,color:"#4A5568",fontFamily:mono,letterSpacing:1,marginRight:3}}>WEEK OF</span>
          <button onClick={()=>setWeekStart(addDays(weekStart,-7))} style={{background:"transparent",border:"none",color:"#4A5568",fontSize:16,cursor:"pointer",padding:"0 3px",lineHeight:1,fontFamily:mono}}>‹</button>
          <div style={{position:"relative",display:"flex",alignItems:"center"}}>
            <span style={{fontFamily:mono,fontSize:11,color:"#38BDF8",userSelect:"none",minWidth:84,textAlign:"center"}}>
              {fmtShort(weekStart)} {parseDate(weekStart)?.getUTCFullYear()}
            </span>
            <input type="date" value={weekStart} onChange={e=>setWeekStart(getMon(e.target.value))}
              style={{position:"absolute",inset:0,opacity:0,cursor:"pointer",width:"100%",colorScheme:"dark"}}/>
          </div>
          <button onClick={()=>setWeekStart(addDays(weekStart,7))} style={{background:"transparent",border:"none",color:"#4A5568",fontSize:16,cursor:"pointer",padding:"0 3px",lineHeight:1,fontFamily:mono}}>›</button>
        </div>
        {[["cpt","Captain"],["fo","F/Officer"]].map(([r,lbl])=>(
          <button key={r} onClick={()=>setRole(r)} style={{padding:"4px 12px",borderRadius:6,cursor:"pointer",background:role===r?"#0F1929":"transparent",border:`1px solid ${role===r?"#38BDF8":"#141420"}`,color:role===r?"#38BDF8":"#4A5568",fontSize:10,fontWeight:700,fontFamily:mono}}>{lbl}</button>
        ))}
        <select value={yearIdx} onChange={e=>setYearIdx(+e.target.value)} style={{background:"#0D1117",border:"1px solid #141420",borderRadius:6,color:"#38BDF8",padding:"4px 8px",fontFamily:mono,fontSize:10,cursor:"pointer"}}>
          {INDEX_YEARS.map((y,i)=><option key={i} value={i}>{y.label}</option>)}
        </select>
        <div style={{display:"flex",gap:2,flex:1}}>
          {[["entry","DUTY ENTRY"],["rates","MEAL RATES"],["summary","WEEK SUMMARY"],["monthly","MONTHLY"]].map(([id,lbl])=>(
            <button key={id} onClick={()=>setTab(id)} style={{background:"transparent",border:"none",color:tab===id?"#38BDF8":"#2D3748",borderBottom:tab===id?"2px solid #38BDF8":"2px solid transparent",padding:"0 12px",height:52,fontSize:10,fontWeight:700,letterSpacing:1.5,fontFamily:mono,cursor:"pointer"}}>{lbl}</button>
          ))}
        </div>
        <div style={{display:"flex",gap:8,flexShrink:0}}>
          <input value={empName} onChange={e=>setEmpName(e.target.value)} style={{background:"transparent",border:"none",borderBottom:"1px solid #141420",color:"#CBD5E1",fontSize:12,fontWeight:700,fontFamily:"'Syne'",width:155,padding:"2px 0"}}/>
          <input value={empNo}   onChange={e=>setEmpNo(e.target.value)}   style={{background:"transparent",border:"none",borderBottom:"1px solid #141420",color:"#4A5568",fontSize:10,fontFamily:mono,width:80,padding:"2px 0"}}/>
        </div>
        <div style={{fontFamily:mono,fontSize:11,color:"#38BDF8",letterSpacing:1,flexShrink:0}}>{utc}</div>
      </div>

      {/* ── Day tabs ── */}
      {tab==="entry"&&(
        <div style={{background:"#09090F",borderBottom:"1px solid #141420",padding:"8px 20px",display:"flex",gap:5,overflowX:"auto",alignItems:"stretch"}}>
          {DAY_NAMES.map((day,idx)=>{
            const dt=dateFor(idx),t=dayTotals[day],isAct=active===day;
            const isWknd=day==="SAT"||day==="SUN";
            const sec0=days[day].sectors[0],secN=days[day].sectors[days[day].sectors.length-1];
            const route=sec0?.depAirport&&secN?.arrAirport?`${sec0.depAirport}→${secN.arrAirport}`:"";
            return (
              <div key={day} className="dpill" onClick={()=>{ setActive(day); setConfirmReset(false); }} style={{padding:"7px 11px",borderRadius:9,flexShrink:0,cursor:"pointer",minWidth:82,background:isAct?"#0F1929":"transparent",border:`1px solid ${isAct?"#1E3A5F":"#141420"}`}}>
                <div style={{fontSize:10,fontWeight:800,fontFamily:mono,letterSpacing:1,color:isWknd?(isAct?"#F87171":"#4A5568"):(isAct?"#E2E8F0":"#4A5568")}}>{day}</div>
                <div style={{fontSize:11,fontWeight:600,color:isAct?"#38BDF8":"#2D3748",marginTop:1}}>{fmtShort(dt)}</div>
                {route&&<div style={{fontSize:7,color:isAct?"#4A7A9B":"#2D3748",marginTop:2,fontFamily:mono}}>{route}</div>}
                {days[day].sectors.length>2&&<div style={{fontSize:7,color:"#4A5568",fontFamily:mono,marginTop:1}}>{days[day].sectors.length} sectors</div>}
                <div style={{fontSize:9,fontFamily:mono,marginTop:3,color:t>0?"#86EFAC":"#2D3748",fontWeight:t>0?700:400}}>{t>0?`$${fmtAUD(t)}`:"—"}</div>
              </div>
            );
          })}
          <div style={{marginLeft:"auto",padding:"7px 13px",borderRadius:9,flexShrink:0,background:weekTotal>0?"#0A1A2F":"transparent",border:`1px solid ${weekTotal>0?"#1E3A5F":"#141420"}`,display:"flex",flexDirection:"column",justifyContent:"center"}}>
            <div style={{fontSize:7,color:"#4A5568",fontFamily:mono,letterSpacing:1}}>WEEK</div>
            <div style={{fontSize:7,color:"#2D3748",fontFamily:mono,marginTop:1}}>{fmtShort(weekStart)}–{fmtShort(weekDate(weekStart,6))}</div>
            <div style={{fontSize:13,fontWeight:700,fontFamily:mono,color:weekTotal>0?"#38BDF8":"#2D3748",marginTop:3,textShadow:weekTotal>0?"0 0 14px rgba(56,189,248,0.4)":"none"}}>{weekTotal>0?`$${fmtAUD(weekTotal)}`:"—"}</div>
          </div>
        </div>
      )}

      <div style={{maxWidth:980,margin:"0 auto",padding:"16px 20px"}}>

        {/* ══ DUTY ENTRY ══ */}
        {tab==="entry"&&(
          <div className="fadein">
            {/* Day header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14,flexWrap:"wrap",gap:8}}>
              <div>
                <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono}}>DUTY DAY</div>
                <div style={{fontSize:24,fontWeight:800,color:"#E2E8F0",letterSpacing:-0.5,lineHeight:1}}>
                  {active} <span style={{color:"#38BDF8"}}>{fmtShort(dayDate)}</span>
                </div>
                <div style={{fontSize:10,color:"#4A5568",marginTop:2}}>{fmtFull(dayDate)}</div>
              </div>
              <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:9,color:"#4A5568",fontFamily:mono}}>{d.sectors.length} sector{d.sectors.length!==1?"s":""}</span>
                {confirmReset ? (
                  <div style={{display:"flex",alignItems:"center",gap:6,background:"#1a0a0a",border:"1px solid #EF444460",borderRadius:8,padding:"4px 8px"}}>
                    <span style={{fontSize:9,color:"#EF4444",fontFamily:mono}}>Clear {active}?</span>
                    <button onClick={()=>{ setDays(p=>({...p,[active]:emptyDay()})); setConfirmReset(false); }}
                      style={{background:"#EF4444",border:"none",borderRadius:5,color:"#fff",fontSize:9,cursor:"pointer",padding:"3px 8px",fontFamily:mono,fontWeight:700}}>
                      Yes, clear
                    </button>
                    <button onClick={()=>setConfirmReset(false)}
                      style={{background:"transparent",border:"1px solid #2D3748",borderRadius:5,color:"#4A5568",fontSize:9,cursor:"pointer",padding:"3px 8px",fontFamily:mono}}>
                      Cancel
                    </button>
                  </div>
                ) : (
                  <button onClick={()=>setConfirmReset(true)}
                    style={{background:"transparent",border:"1px solid #EF444435",borderRadius:7,color:"#EF4444",fontSize:10,cursor:"pointer",padding:"4px 10px",fontFamily:mono,letterSpacing:0.5,display:"flex",alignItems:"center",gap:5}}
                    onMouseEnter={e=>{e.currentTarget.style.background="#EF444415";e.currentTarget.style.borderColor="#EF444470";}}
                    onMouseLeave={e=>{e.currentTarget.style.background="transparent";e.currentTarget.style.borderColor="#EF444435";}}
                  >↺ Reset day</button>
                )}
              </div>
            </div>

            {/* ── Sectors ── */}
            {d.sectors.map((sec,idx)=>{
              const isBeforeHotel = d.hasSlip&&d.hotelAfterSectorIdx===idx;
              const isAfterHotel  = d.hasSlip&&d.hotelAfterSectorIdx!=null&&idx===d.hotelAfterSectorIdx+1;
              const sDate = sec.sectorDate || (idx>0&&d.hotelTo&&d.hasSlip ? d.hotelTo : dayDate);

              return (
                <div key={sec.id}>
                  <SectorCard
                    sec={sec}
                    idx={idx}
                    sectorDate={sDate}
                    tripDate={dayDate}
                    onUpdate={(field,val)=>updSector(active,sec.id,field,val)}
                    onRemove={()=>removeSector(active,sec.id)}
                    onAddHotelAfter={()=>setHotelAfter(active,idx)}
                    hasHotelAfter={isBeforeHotel}
                    showHotelBtn={idx<d.sectors.length-1}
                    totalSectors={d.sectors.length}
                  />

                  {/* "Add sector between" button */}
                  {idx<d.sectors.length-1&&(
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                      <div style={{flex:1,height:1,background:"#141420"}}/>
                      <button className="addBtn" onClick={()=>insertSectorAt(active,idx)} style={{
                        background:"#0D1117",border:"1px dashed #2D3748",borderRadius:7,
                        color:"#4A5568",fontSize:9,cursor:"pointer",padding:"3px 10px",
                        fontFamily:mono,letterSpacing:0.5,flexShrink:0,
                      }}>+ Insert sector here</button>
                      <div style={{flex:1,height:1,background:"#141420"}}/>
                    </div>
                  )}

                  {/* Hotel block between sectors */}
                  {isBeforeHotel&&(
                    <Card border="#1E3A5F" style={{marginBottom:8}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                        <SHead style={{marginBottom:0}}>🏨 HOTEL STAY — between sector {idx+1} and {idx+2}</SHead>
                        <button onClick={()=>toggleSlip(active,false)} style={{background:"transparent",border:"1px solid #EF444430",borderRadius:5,color:"#EF4444",fontSize:10,cursor:"pointer",padding:"2px 7px",fontFamily:mono}}>Remove hotel</button>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:10,marginBottom:12,alignItems:"end"}}>
                        <ICard border="#1E3A5F" style={{display:"flex",flexDirection:"column",gap:9}}>
                          <div style={{fontSize:8,letterSpacing:1.5,color:"#38BDF8",fontFamily:mono}}>CHECK-IN</div>
                          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                            <DInput label="DATE" value={d.hotelFrom} onChange={v=>updDay(active,"hotelFrom",v)} hi/>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                                <span style={{fontSize:8,letterSpacing:1,color:"#38BDF8",fontFamily:mono}}>TIME</span>
                                {sec.arrAirport&&<span style={{fontSize:7,color:"#2D3748",fontFamily:mono,background:"#141420",borderRadius:3,padding:"1px 4px"}}>{tzLabel(sec.arrAirport,sDate)}</span>}
                                <span style={{fontSize:7,color:"#34D399",fontFamily:mono}}>auto</span>
                              </div>
                              <input type="time" value={d.hotelCheckIn} onChange={e=>updDay(active,"hotelCheckIn",e.target.value)}
                                style={{background:"#09090F",border:"1px solid #1E3A5F",borderRadius:6,color:d.hotelCheckIn?"#E2E8F0":"#2D3748",padding:"5px 8px",fontFamily:mono,fontSize:13,width:100}}/>
                            </div>
                          </div>
                        </ICard>
                        <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4,paddingBottom:4}}>
                          <div style={{fontSize:22,color:"#2D3748"}}>⬌</div>
                          {nights>0&&<div style={{background:"#0A1A2F",border:"1px solid #1E3A5F",borderRadius:8,padding:"4px 10px",textAlign:"center"}}>
                            <div style={{fontFamily:mono,fontSize:14,fontWeight:700,color:"#38BDF8"}}>{nights}</div>
                            <div style={{fontSize:7,color:"#4A5568",fontFamily:mono}}>night{nights!==1?"s":""}</div>
                          </div>}
                          {totSlip>0&&<div style={{fontSize:8,color:totSlip>4*60?"#34D399":"#EF4444",fontFamily:mono,textAlign:"center"}}>{(totSlip/60).toFixed(1)}h{totSlip>4*60?" ✓":" ✗"}</div>}
                        </div>
                        <ICard border="#1a2a1a" style={{display:"flex",flexDirection:"column",gap:9}}>
                          <div style={{fontSize:8,letterSpacing:1.5,color:"#86EFAC",fontFamily:mono}}>CHECK-OUT</div>
                          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                            <DInput label="DATE" value={d.hotelTo} onChange={v=>updDay(active,"hotelTo",v)} hi/>
                            <div>
                              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:3}}>
                                <span style={{fontSize:8,letterSpacing:1,color:"#86EFAC",fontFamily:mono}}>TIME</span>
                                {retDepTz&&<span style={{fontSize:7,color:"#2D3748",fontFamily:mono,background:"#141420",borderRadius:3,padding:"1px 4px"}}>{tzLabel(retDepTz,d.hotelTo||dayDate)}</span>}
                                <span style={{fontSize:7,color:"#34D399",fontFamily:mono}}>auto</span>
                              </div>
                              <input type="time" value={d.hotelCheckOut} onChange={e=>updDay(active,"hotelCheckOut",e.target.value)}
                                style={{background:"#09090F",border:"1px solid #1a2a1a",borderRadius:6,color:d.hotelCheckOut?"#E2E8F0":"#2D3748",padding:"5px 8px",fontFamily:mono,fontSize:13,width:100}}/>
                            </div>
                          </div>
                        </ICard>
                      </div>

                      {/* Zone + meal dest */}
                      {sec.arrAirport&&(
                        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:perDayM.length>0?12:0}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,background:`${hotelDest.color}10`,border:`1px solid ${hotelDest.color}30`,borderRadius:8,padding:"5px 10px"}}>
                            <span style={{fontSize:13}}>{hotelDest.flag}</span>
                            <div>
                              <div style={{fontSize:9,fontWeight:700,color:hotelDest.color}}>{hotelDest.label}</div>
                              <div style={{fontSize:7,color:"#4A5568",fontFamily:mono}}>B ${fmtAUD(hotelDest.breakfast)} · L ${fmtAUD(hotelDest.lunch)} · D ${fmtAUD(hotelDest.dinner)}</div>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* Per-day meals */}
                      {perDayM.length>0&&totSlip>4*60&&(
                        <div>
                          <div style={{fontSize:8,color:"#2D3748",fontFamily:mono,letterSpacing:1.5,marginBottom:7}}>MEAL COVERAGE PER CALENDAR DAY</div>
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            {perDayM.map((pd)=>{
                              const calDays = nights+1;
                              const isCI = pd.dayNum===1;
                              const isCO = pd.dayNum===calDays;
                              const tag  = isCI ? "CI" : isCO ? "CO" : `D${pd.dayNum}`;
                              const presStartStr = fmtTime(pd.presStart===1440 ? 0 : pd.presStart);
                              const presEndStr   = pd.presEnd===1440 ? "24:00" : fmtTime(pd.presEnd);
                              return (
                                <div key={pd.dayNum} style={{display:"flex",alignItems:"center",gap:8,background:pd.isFullDay?"#0A1A0A":"#09090F",border:`1px solid ${pd.isFullDay?"#1a3a1a":"#141420"}`,borderRadius:8,padding:"7px 11px"}}>
                                  <div style={{fontFamily:mono,fontSize:9,fontWeight:700,color:pd.isFullDay?"#86EFAC":"#4A5568",width:24,flexShrink:0}}>{tag}</div>
                                  <div style={{flexShrink:0,minWidth:100}}>
                                    <div style={{fontSize:8,color:"#CBD5E1",fontFamily:mono,fontWeight:600}}>{fmtShort(pd.date)}</div>
                                    <div style={{fontSize:7,color:"#2D3748",fontFamily:mono,marginTop:1}}>
                                      {pd.isFullDay ? "full day" : `${presStartStr}–${presEndStr}`}
                                    </div>
                                  </div>
                                  <div style={{display:"flex",gap:5,flex:1,flexWrap:"wrap"}}>
                                    {MEAL_WINDOWS.map(w=>{
                                      const ok=pd[w.id];
                                      return <div key={w.id} style={{display:"flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:5,background:ok?`${w.color}15`:"transparent",border:`1px solid ${ok?w.color+"40":"#1a1a2e"}`,opacity:ok?1:0.3}}>
                                        <span style={{fontSize:9}}>{w.icon}</span>
                                        <span style={{fontSize:8,color:ok?w.color:"#2D3748",fontFamily:mono}}>{ok?`$${fmtAUD(hotelDest[w.key])}`:"—"}</span>
                                      </div>;
                                    })}
                                  </div>
                                  <div style={{fontFamily:mono,fontSize:9,fontWeight:700,color:"#86EFAC",minWidth:50,textAlign:"right"}}>
                                    ${fmtAUD((pd.b?hotelDest.breakfast:0)+(pd.l?hotelDest.lunch:0)+(pd.d?hotelDest.dinner:0))}
                                  </div>
                                </div>
                              );
                            })}
                            {totSlip>24*60&&<div style={{display:"flex",alignItems:"center",gap:8,background:"#09090F",border:`1px solid #D9770640`,borderRadius:8,padding:"6px 11px"}}>
                              <span style={{fontSize:12}}>☕</span>
                              <div style={{flex:1,fontSize:9,color:"#D97706"}}>Incidental — {hotelDest.label} ({(totSlip/60).toFixed(1)}h slip &gt; 24h)</div>
                              <div style={{fontFamily:mono,fontSize:9,fontWeight:700,color:"#86EFAC"}}>${fmtAUD(hotelDest.incidental)}</div>
                            </div>}
                          </div>
                        </div>
                      )}
                    </Card>
                  )}
                </div>
              );
            })}

            {/* Add sector to end */}
            <button className="addBtn" onClick={()=>addSector(active)} style={{
              width:"100%",background:"#0D1117",border:"1px dashed #2D3748",borderRadius:10,
              color:"#4A5568",fontSize:10,cursor:"pointer",padding:"10px",
              fontFamily:mono,letterSpacing:0.5,marginBottom:12,
              display:"flex",alignItems:"center",justifyContent:"center",gap:6,
            }}>
              <span style={{fontSize:14}}>+</span> Add sector
            </button>

            {/* ── Hotel toggle (if none added yet) ── */}
            {!d.hasSlip&&(
              <Card style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <SHead style={{marginBottom:0}}>🏨 HOTEL STAY</SHead>
                  <Toggle label="Add hotel stay" checked={false} onChange={v=>toggleSlip(active,v)}/>
                </div>
              </Card>
            )}

            {/* ── Other ── */}
            <Card style={{marginBottom:14}}>
              <SHead>OTHER</SHead>
              <div style={{display:"flex",flexWrap:"wrap",gap:18,alignItems:"center"}}>
                <Toggle label="DDO infringed (Cl. 5.20/5.33)"            checked={d.ddoInfringed} onChange={v=>updDay(active,"ddoInfringed",v)} color="#EF4444"/>
                <Toggle label="Extra Duty Variation Allowance (Cl. 5.28)" checked={d.extraDva}   onChange={v=>updDay(active,"extraDva",v)}      color="#F59E0B"/>
                <Toggle label="Extra Day Off Payment (Cl. 5.20)"          checked={d.extraDdo}   onChange={v=>updDay(active,"extraDdo",v)}       color="#EF4444"/>

                {/* Accommodation opt-out — numeric nights stepper */}
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{display:"flex",flexDirection:"column",gap:2}}>
                    <span style={{fontSize:10,color:d.accomOptOut>0?"#818CF8":"#4A5568"}}>Accommodation opt-out (Cl. 6.32)</span>
                    <span style={{fontSize:8,color:"#2D3748",fontFamily:mono}}>${fmtAUD(RATES.ACCOM_OPTOUT)} × nights</span>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:6,background:"#09090F",border:`1px solid ${d.accomOptOut>0?"#818CF8":"#1a1a2e"}`,borderRadius:8,padding:"4px 8px"}}>
                    <button onClick={()=>updDay(active,"accomOptOut",Math.max(0,d.accomOptOut-1))}
                      style={{background:"transparent",border:`1px solid ${d.accomOptOut>0?"#818CF840":"#1a1a2e"}`,borderRadius:4,color:d.accomOptOut>0?"#818CF8":"#4A5568",fontSize:13,cursor:"pointer",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,padding:0}}>−</button>
                    <span style={{fontFamily:mono,fontSize:14,fontWeight:700,color:d.accomOptOut>0?"#818CF8":"#2D3748",minWidth:18,textAlign:"center"}}>{d.accomOptOut}</span>
                    <button onClick={()=>updDay(active,"accomOptOut",d.accomOptOut+1)}
                      style={{background:"transparent",border:"1px solid #818CF840",borderRadius:4,color:"#818CF8",fontSize:13,cursor:"pointer",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:mono,padding:0}}>+</button>
                  </div>
                  {d.accomOptOut>0&&<span style={{fontSize:9,fontFamily:mono,color:"#86EFAC"}}>${fmtAUD(RATES.ACCOM_OPTOUT*d.accomOptOut)}</span>}
                </div>
              </div>
            </Card>

            {/* ── Results ── */}
            <div style={{fontSize:9,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:10}}>
              AUTO-CALCULATED ALLOWANCES — {active} {fmtShort(dayDate)}
            </div>
            {dayResults[active].length===0
              ?<div style={{background:"#0D1117",border:"1px solid #141420",borderRadius:12,padding:24,textAlign:"center",color:"#2D3748",fontSize:12}}>
                No allowances triggered — enter sector times above
              </div>
              :<div style={{display:"flex",flexDirection:"column",gap:8}}>
                {dayResults[active].map((item,i)=>(
                  <div key={i} style={{background:`${item.color}10`,border:`1px solid ${item.color}30`,borderRadius:10,padding:"10px 14px",display:"flex",alignItems:"flex-start",gap:10}}>
                    <span style={{fontSize:17,flexShrink:0}}>{item.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                          <span style={{fontSize:12,fontWeight:700,color:item.color}}>{item.label}</span>
                          <span style={{fontSize:8,fontWeight:700,letterSpacing:0.8,color:item.color,border:`1px solid ${item.color}40`,borderRadius:3,padding:"1px 4px",background:`${item.color}10`,fontFamily:mono}}>{item.clause}</span>
                        </div>
                        {item.amount>0&&<span style={{fontFamily:mono,fontSize:14,fontWeight:700,color:"#86EFAC",whiteSpace:"nowrap"}}>${fmtAUD(item.amount)}</span>}
                      </div>
                      <div style={{fontSize:9,color:"#4A5568",marginTop:3,lineHeight:1.5}}>{item.reason}</div>
                    </div>
                  </div>
                ))}
                <div style={{background:"#0A1A2F",border:"1px solid #1E3A5F",borderRadius:10,padding:"11px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
                  <span style={{fontSize:9,letterSpacing:1.5,color:"#4A5568",fontFamily:mono}}>TOTAL — {active} {fmtShort(dayDate)}</span>
                  <span style={{fontFamily:mono,fontSize:18,fontWeight:700,color:"#38BDF8",textShadow:"0 0 20px rgba(56,189,248,0.35)"}}>AUD ${fmtAUD(dayTotals[active])}</span>
                </div>
              </div>
            }
          </div>
        )}

        {/* ══ MEAL RATES ══ */}
        {tab==="rates"&&(
          <div className="fadein">
            <div style={{marginBottom:16}}>
              <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:4}}>EFA EA 2025 — CL. 6.22–6.24</div>
              <div style={{fontSize:22,fontWeight:800,color:"#E2E8F0"}}>Meal Allowance Schedule</div>
            </div>
            <Card style={{padding:0,overflow:"hidden",marginBottom:18}}>
              <div style={{padding:"9px 14px",fontSize:9,letterSpacing:2,color:"#2D3748",fontFamily:mono,borderBottom:"1px solid #141420"}}>AIRPORT → MEAL ZONE</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))"}}>
                {AIRPORTS.map(ap=>{
                  const dest=DESTINATIONS[zoneFrom(ap.code)];
                  return <div key={ap.code} style={{padding:"11px 14px",borderRight:"1px solid #0D0D1A",borderBottom:"1px solid #0D0D1A",display:"flex",alignItems:"center",gap:9}}>
                    <div style={{fontSize:20}}>{ap.flag}</div>
                    <div>
                      <div style={{fontFamily:mono,fontSize:12,fontWeight:700,color:"#E2E8F0"}}>{ap.code}</div>
                      <div style={{fontSize:10,color:"#4A5568"}}>{ap.name}</div>
                      <div style={{fontSize:8,fontWeight:700,color:dest.color,marginTop:1}}>{dest.flag} {dest.label}</div>
                    </div>
                  </div>;
                })}
              </div>
            </Card>
            <Card style={{padding:0,overflow:"hidden"}}>
              <div style={{display:"grid",gridTemplateColumns:"155px repeat(4,1fr)",borderBottom:"1px solid #141420"}}>
                <div style={{padding:"9px 14px",fontSize:8,letterSpacing:1.5,color:"#4A5568",fontFamily:mono,borderRight:"1px solid #141420"}}>ALLOWANCE</div>
                {Object.values(DESTINATIONS).map((dest,i)=>(
                  <div key={i} style={{padding:"9px 12px",borderRight:i<3?"1px solid #141420":"none"}}>
                    <div style={{fontSize:16}}>{dest.flag}</div>
                    <div style={{fontSize:9,fontWeight:700,color:dest.color,marginTop:2,lineHeight:1.3}}>{dest.label}</div>
                  </div>
                ))}
              </div>
              {[
                {label:"Breakfast",icon:"🍳",clause:"Cl. 6.24(a)",win:"0730–0930",key:"breakfast",color:"#FCD34D"},
                {label:"Lunch",icon:"🥗",clause:"Cl. 6.24(b)",win:"1130–1330",key:"lunch",color:"#86EFAC"},
                {label:"Dinner",icon:"🍽️",clause:"Cl. 6.24(c)",win:"1730–1930",key:"dinner",color:"#F59E0B"},
                {label:"Total (meals only)",icon:"∑",clause:"",win:"",key:"_t",color:"#94A3B8",sub:true},
                {label:"Incidental",icon:"☕",clause:"Cl. 6.24",win:">24h",key:"incidental",color:"#D97706"},
                {label:"Total (inc. incidental)",icon:"★",clause:"",win:"",key:"_ti",color:"#38BDF8",bold:true},
              ].map((row,ri,arr)=>(
                <div key={row.key} style={{display:"grid",gridTemplateColumns:"155px repeat(4,1fr)",borderBottom:ri<arr.length-1?"1px solid #0D0D1A":"none",background:row.bold?"#0A1A2F":row.sub?"#09090F":"transparent"}}>
                  <div style={{padding:"10px 14px",borderRight:"1px solid #141420",display:"flex",alignItems:"center",gap:7}}>
                    <span style={{fontSize:14}}>{row.icon}</span>
                    <div>
                      <div style={{fontSize:11,fontWeight:row.bold?800:600,color:row.bold?"#E2E8F0":row.sub?"#4A5568":"#CBD5E1"}}>{row.label}</div>
                      {row.clause&&<div style={{fontSize:7,color:"#2D3748",fontFamily:mono,marginTop:1}}>{row.clause}{row.win?` · ${row.win}`:""}</div>}
                    </div>
                  </div>
                  {Object.values(DESTINATIONS).map((dest,i)=>{
                    const val=row.key==="_t"?dest.breakfast+dest.lunch+dest.dinner:row.key==="_ti"?dest.breakfast+dest.lunch+dest.dinner+dest.incidental:dest[row.key];
                    return <div key={i} style={{padding:"10px 12px",borderRight:i<3?"1px solid #141420":"none",textAlign:"right"}}>
                      <span style={{fontFamily:mono,fontSize:row.bold?14:12,fontWeight:row.bold?700:500,color:row.bold?"#38BDF8":row.sub?"#4A5568":"#E2E8F0"}}>${fmtAUD(val)}</span>
                    </div>;
                  })}
                </div>
              ))}
            </Card>
          </div>
        )}

        {/* ══ WEEK SUMMARY ══ */}
        {tab==="summary"&&(
          <div className="fadein">
            <div style={{marginBottom:16}}>
              <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:4}}>WEEK OF {fmtFull(weekStart)}</div>
              <div style={{fontSize:24,fontWeight:800,color:"#E2E8F0"}}>{empName}</div>
              <div style={{fontSize:10,color:"#4A5568",marginTop:3,fontFamily:mono}}>{empNo} · {role==="cpt"?"Captain":"First Officer"} · {INDEX_YEARS[yearIdx].label}</div>
            </div>
            <div style={{background:"linear-gradient(135deg,#0D1529,#09090F)",border:"1px solid #1E3A5F",borderRadius:14,padding:"16px 20px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:4}}>TOTAL ALLOWANCES — WEEK</div>
                <div style={{fontFamily:mono,fontSize:38,fontWeight:700,color:"#38BDF8",letterSpacing:-1.5,textShadow:"0 0 30px rgba(56,189,248,0.25)"}}>AUD ${fmtAUD(weekTotal)}</div>
              </div>
              <div style={{fontSize:44,opacity:0.06}}>✈</div>
            </div>
            <Card style={{padding:0,overflow:"hidden",marginBottom:18}}>
              {DAY_NAMES.map((day,di)=>{
                const items=dayResults[day],t=dayTotals[day],dt=dateFor(di);
                const secs=days[day].sectors;
                const first=secs[0],last=secs[secs.length-1];
                const nt=daysBetween(days[day].hotelFrom,days[day].hotelTo);
                return (
                  <div key={day} className="hrow" onClick={()=>{setActive(day);setTab("entry");}} style={{display:"grid",gridTemplateColumns:"125px 1fr auto",borderBottom:di<6?"1px solid #0D0D1A":"none",cursor:"pointer",transition:"background 0.15s"}}>
                    <div style={{padding:"10px 12px",borderRight:"1px solid #141420"}}>
                      <div style={{display:"flex",alignItems:"baseline",gap:5}}>
                        <span style={{fontFamily:mono,fontSize:10,fontWeight:700,color:(day==="SAT"||day==="SUN")?"#F87171":t>0?"#CBD5E1":"#2D3748"}}>{day}</span>
                        <span style={{fontSize:10,fontWeight:600,color:t>0?"#38BDF8":"#2D3748"}}>{fmtShort(dt)}</span>
                      </div>
                      {first?.depAirport&&last?.arrAirport&&<div style={{fontSize:7,color:"#4A5568",fontFamily:mono,marginTop:1}}>{first.depAirport}→{last.arrAirport}{secs.length>2?` (${secs.length}sec)`:""}</div>}
                      {nt>0&&<div style={{fontSize:7,color:"#60A5FA",fontFamily:mono,marginTop:1}}>🏨 {nt}n</div>}
                    </div>
                    <div style={{padding:"10px 12px",borderRight:"1px solid #141420"}}>
                      {items.length>0
                        ?<div style={{display:"flex",flexWrap:"wrap",gap:4}}>{items.map((item,i)=>(
                          <span key={i} style={{fontSize:8,padding:"2px 5px",borderRadius:4,background:`${item.color}15`,color:item.color,border:`1px solid ${item.color}30`,fontWeight:600,fontFamily:mono}}>
                            {item.icon} {item.label}{item.amount>0?` $${fmtAUD(item.amount)}`:""}</span>
                        ))}</div>
                        :<span style={{fontSize:10,color:"#1a1a2e"}}>{days[day].sectors[0]?.rSignOn?"No allowances triggered":"No data entered"}</span>
                      }
                    </div>
                    <div style={{padding:"10px 14px",textAlign:"right",fontFamily:mono,fontSize:13,fontWeight:700,color:t>0?"#86EFAC":"#1a1a2e"}}>{t>0?`$${fmtAUD(t)}`:"—"}</div>
                  </div>
                );
              })}
              <div style={{display:"grid",gridTemplateColumns:"125px 1fr auto",background:"#0A1A2F",borderTop:"1px solid #1E3A5F"}}>
                <div style={{padding:"10px 12px"}}/>
                <div style={{padding:"10px 12px",fontSize:8,color:"#4A5568",fontFamily:mono}}>{Object.values(dayResults).flat().filter(i=>i.amount>0).length} allowance items</div>
                <div style={{padding:"10px 14px",textAlign:"right",fontFamily:mono,fontSize:17,fontWeight:700,color:weekTotal>0?"#38BDF8":"#2D3748",textShadow:weekTotal>0?"0 0 20px rgba(56,189,248,0.3)":"none"}}>{weekTotal>0?`$${fmtAUD(weekTotal)}`:"—"}</div>
              </div>
            </Card>
            {(()=>{
              const by={};
              DAY_NAMES.forEach(day=>dayResults[day].forEach(item=>{
                if(!by[item.id])by[item.id]={...item,count:0,total:0};
                by[item.id].count++;by[item.id].total+=item.amount;
              }));
              const sorted=Object.values(by).sort((a,b)=>b.total-a.total);
              if(!sorted.length) return null;
              return <>
                <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:9}}>ALLOWANCE TYPE BREAKDOWN</div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))",gap:8}}>
                  {sorted.map(item=>(
                    <div key={item.id} style={{background:"#0D1117",border:`1px solid ${item.color}25`,borderRadius:10,padding:"11px 13px",display:"flex",alignItems:"center",gap:9}}>
                      <span style={{fontSize:18}}>{item.icon}</span>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11,fontWeight:600,color:item.color}}>{item.label}</div>
                        <div style={{fontSize:8,color:"#4A5568",marginTop:1}}>{item.count}× · {item.clause}</div>
                      </div>
                      <div style={{fontFamily:mono,fontSize:13,fontWeight:700,color:"#86EFAC"}}>{item.total>0?`$${fmtAUD(item.total)}`:"—"}</div>
                    </div>
                  ))}
                </div>
              </>;
            })()}
          </div>
        )}

        {/* ══ MONTHLY SUMMARY ══ */}
        {tab==="monthly"&&(()=>{
          // Parse monthView "YYYY-MM" to get year and month (0-indexed)
          const [mvYear,mvMonth]=monthView.split("-").map(Number);

          // Find all weeks that overlap this month — a week overlaps if any of its 7 days is in the month
          const weeksInMonth=Object.keys(allWeeks).filter(ws=>{
            for(let i=0;i<7;i++){
              const dt=addDays(ws,i);
              const d=parseDate(dt);
              if(d&&d.getUTCFullYear()===mvYear&&d.getUTCMonth()===mvMonth-1) return true;
            }
            return false;
          }).sort();

          // Compute totals for each matching week
          const weekData=weeksInMonth.map(ws=>{
            const wDays=allWeeks[ws];
            const wResults={};
            DAY_NAMES.forEach(dn=>{wResults[dn]=calcAllowances(wDays[dn],role,yearIdx,weekDate(ws,DAY_NAMES.indexOf(dn)));});
            const wTotal=Object.values(wResults).flat().reduce((s,i)=>s+i.amount,0);
            const wItems=Object.values(wResults).flat();
            // Per-type breakdown
            const byType={};
            wItems.forEach(item=>{
              if(!byType[item.id]) byType[item.id]={...item,count:0,total:0};
              byType[item.id].count++;byType[item.id].total+=item.amount;
            });
            return {ws,wTotal,byType,wDays};
          });

          const monthTotal=weekData.reduce((s,w)=>s+w.wTotal,0);

          // Aggregate allowance types across all weeks in the month
          const monthByType={};
          weekData.forEach(({byType})=>{
            Object.entries(byType).forEach(([id,item])=>{
              if(!monthByType[id]) monthByType[id]={...item,count:0,total:0};
              monthByType[id].count+=item.count;
              monthByType[id].total+=item.total;
            });
          });
          const monthTypes=Object.values(monthByType).sort((a,b)=>b.total-a.total);

          const monthName=new Date(mvYear,mvMonth-1,1).toLocaleString("en-AU",{month:"long"});

          return (
            <div className="fadein">
              {/* Month navigator */}
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18,flexWrap:"wrap",gap:10}}>
                <div>
                  <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:4}}>MONTHLY ALLOWANCE SUMMARY</div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <button onClick={()=>{const d=new Date(mvYear,mvMonth-2,1);setMonthView(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}}
                      style={{background:"transparent",border:"none",color:"#4A5568",fontSize:18,cursor:"pointer",fontFamily:mono,padding:"0 4px"}}>‹</button>
                    <div style={{fontSize:24,fontWeight:800,color:"#E2E8F0"}}>{monthName} {mvYear}</div>
                    <button onClick={()=>{const d=new Date(mvYear,mvMonth,1);setMonthView(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);}}
                      style={{background:"transparent",border:"none",color:"#4A5568",fontSize:18,cursor:"pointer",fontFamily:mono,padding:"0 4px"}}>›</button>
                  </div>
                  <div style={{fontSize:10,color:"#4A5568",marginTop:3,fontFamily:mono}}>{empNo} · {role==="cpt"?"Captain":"First Officer"} · {INDEX_YEARS[yearIdx].label}</div>
                </div>
                <input type="month" value={monthView} onChange={e=>setMonthView(e.target.value)}
                  style={{background:"#0D1117",border:"1px solid #141420",borderRadius:8,color:"#38BDF8",padding:"6px 10px",fontFamily:mono,fontSize:11,colorScheme:"dark",cursor:"pointer"}}/>
              </div>

              {/* Monthly total card */}
              <div style={{background:"linear-gradient(135deg,#0D1529,#09090F)",border:"1px solid #1E3A5F",borderRadius:14,padding:"16px 20px",marginBottom:18,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:4}}>TOTAL ALLOWANCES — {monthName.toUpperCase()} {mvYear}</div>
                  <div style={{fontFamily:mono,fontSize:38,fontWeight:700,color:monthTotal>0?"#38BDF8":"#2D3748",letterSpacing:-1.5,textShadow:monthTotal>0?"0 0 30px rgba(56,189,248,0.25)":"none"}}>
                    AUD ${fmtAUD(monthTotal)}
                  </div>
                  <div style={{fontSize:9,color:"#4A5568",marginTop:3,fontFamily:mono}}>{weeksInMonth.length} week{weeksInMonth.length!==1?"s":""} with data · {empName}</div>
                </div>
                <div style={{fontSize:44,opacity:0.06}}>📅</div>
              </div>

              {/* Per-week breakdown */}
              {weeksInMonth.length===0 ? (
                <div style={{background:"#0D1117",border:"1px solid #141420",borderRadius:12,padding:32,textAlign:"center",color:"#2D3748",fontSize:12}}>
                  No weeks entered for {monthName} {mvYear}.<br/>
                  <span style={{fontSize:10,marginTop:6,display:"block"}}>Enter duty data in the week view then return here to see the monthly summary.</span>
                </div>
              ) : (
                <>
                  <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:9}}>WEEK-BY-WEEK BREAKDOWN</div>
                  <Card style={{padding:0,overflow:"hidden",marginBottom:18}}>
                    {weekData.map(({ws,wTotal,byType},wi)=>{
                      const wEnd=weekDate(ws,6);
                      return (
                        <div key={ws} className="hrow" onClick={()=>{setWeekStart(ws);setTab("entry");}}
                          style={{display:"grid",gridTemplateColumns:"160px 1fr auto",borderBottom:wi<weekData.length-1?"1px solid #0D0D1A":"none",cursor:"pointer",transition:"background 0.15s"}}>
                          <div style={{padding:"11px 14px",borderRight:"1px solid #141420"}}>
                            <div style={{fontSize:10,fontWeight:700,color:wTotal>0?"#CBD5E1":"#2D3748",fontFamily:mono}}>{fmtShort(ws)}</div>
                            <div style={{fontSize:8,color:"#4A5568",fontFamily:mono,marginTop:1}}>→ {fmtShort(wEnd)}</div>
                          </div>
                          <div style={{padding:"11px 14px",borderRight:"1px solid #141420"}}>
                            {Object.keys(byType).length>0
                              ?<div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                                {Object.values(byType).sort((a,b)=>b.total-a.total).slice(0,6).map(item=>(
                                  <span key={item.id} style={{fontSize:8,padding:"2px 5px",borderRadius:4,background:`${item.color}15`,color:item.color,border:`1px solid ${item.color}30`,fontWeight:600,fontFamily:mono}}>
                                    {item.icon} {item.count>1?`×${item.count} `:""}${fmtAUD(item.total)}
                                  </span>
                                ))}
                              </div>
                              :<span style={{fontSize:10,color:"#1a1a2e"}}>No allowances</span>
                            }
                          </div>
                          <div style={{padding:"11px 16px",textAlign:"right",fontFamily:mono,fontSize:14,fontWeight:700,color:wTotal>0?"#86EFAC":"#1a1a2e"}}>
                            {wTotal>0?`$${fmtAUD(wTotal)}`:"—"}
                          </div>
                        </div>
                      );
                    })}
                    <div style={{display:"grid",gridTemplateColumns:"160px 1fr auto",background:"#0A1A2F",borderTop:"1px solid #1E3A5F"}}>
                      <div style={{padding:"10px 14px",fontSize:8,color:"#4A5568",fontFamily:mono,letterSpacing:1}}>MONTHLY TOTAL</div>
                      <div style={{padding:"10px 14px",fontSize:8,color:"#4A5568",fontFamily:mono}}>{monthTypes.length} allowance types</div>
                      <div style={{padding:"10px 16px",textAlign:"right",fontFamily:mono,fontSize:17,fontWeight:700,color:monthTotal>0?"#38BDF8":"#2D3748",textShadow:monthTotal>0?"0 0 20px rgba(56,189,248,0.3)":"none"}}>
                        {monthTotal>0?`$${fmtAUD(monthTotal)}`:"—"}
                      </div>
                    </div>
                  </Card>

                  {/* Monthly allowance type breakdown */}
                  {monthTypes.length>0&&(
                    <>
                      <div style={{fontSize:8,letterSpacing:2,color:"#2D3748",fontFamily:mono,marginBottom:9}}>ALLOWANCE TYPE BREAKDOWN — {monthName.toUpperCase()}</div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(255px,1fr))",gap:8}}>
                        {monthTypes.map(item=>(
                          <div key={item.id} style={{background:"#0D1117",border:`1px solid ${item.color}25`,borderRadius:10,padding:"11px 13px",display:"flex",alignItems:"center",gap:9}}>
                            <span style={{fontSize:18}}>{item.icon}</span>
                            <div style={{flex:1}}>
                              <div style={{fontSize:11,fontWeight:600,color:item.color}}>{item.label}</div>
                              <div style={{fontSize:8,color:"#4A5568",marginTop:1}}>{item.count}× · {item.clause}</div>
                            </div>
                            <div style={{fontFamily:mono,fontSize:13,fontWeight:700,color:"#86EFAC"}}>${fmtAUD(item.total)}</div>
                          </div>
                        ))}
                      </div>
                    </>
                  )}
                </>
              )}
            </div>
          );
        })()}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
  </script>
</body>
</html>
