<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="format-detection" content="telephone=no">
<meta name="description" content="EFA EA 2025 duty / allowance calculator.">
<title>EFA Duty Calculator</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background: #f4f5f7; color: #1a1f2c; -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; overscroll-behavior-y: none; }
  body { min-height: 100vh; min-height: 100dvh; }
  #root { min-height: 100vh; min-height: 100dvh; }
  input, select, textarea, button { font-size: 16px; font-family: inherit; }
  #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #f4f5f7; color: #6b7280; font-size: 14px; letter-spacing: 0.04em; text-transform: uppercase; z-index: 9999; }
  #loading.gone { display: none; }
</style>
</head>
<body>
<div id="root"></div>
<div id="loading">Loading…</div>
<script>
(function(){
  var observer = new MutationObserver(function(){
    var root = document.getElementById('root');
    if (root && root.children.length > 0) {
      var l = document.getElementById('loading');
      if (l) l.classList.add('gone');
      observer.disconnect();
    }
  });
  observer.observe(document.getElementById('root'), { childList: true, subtree: true });
  setTimeout(function(){ var l = document.getElementById('loading'); if (l) l.classList.add('gone'); }, 5000);
})();
</script>
